<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloads & Cheats</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f1115;
            color: #e6e8ec;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Hópelyhek háttér animáció */
        .snowflake {
            position: fixed;
            top: -10px;
            color: #ffffff;
            font-size: 1em;
            opacity: 0.8;
            pointer-events: none;
            user-select: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(105vh);
            }
        }

        /* Fő konténer */
        .container {
            width: 90%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        h1 {
            font-size: 2.8rem;
            color: #ffffff;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        p.subtitle {
            color: #a0a5b1;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .arrow {
            font-size: 2rem;
            color: #d1d5db;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(10px); }
            60% { transform: translateY(5px); }
        }

        h2.section-title {
            font-size: 1.8rem;
            color: #ffffff;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
            display: inline-block;
        }

        /* Letöltési kártyák elrendezése */
        .downloads-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px 20px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
            border-color: #ffffff;
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
        }

        .card h3 {
            font-size: 1.3rem;
            color: #ffffff;
            margin-bottom: 15px;
        }

        .download-btn {
            display: inline-block;
            width: 100%;
            padding: 12px;
            background: #e6e8ec;
            color: #0f1115;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .download-btn:hover {
            background: #ffffff;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <!-- Hópelyhek generálása JS-sel -->
    <script>
        function createSnowflake() {
            const flake = document.createElement('div');
            flake.classList.add('snowflake');
            flake.innerHTML = '❄';
            flake.style.left = Math.random() * 100 + 'vw';
            flake.style.animationDuration = Math.random() * 3 + 2 + 's';
            flake.style.opacity = Math.random();
            flake.style.fontSize = Math.random() * 10 + 10 + 'px';
            document.body.appendChild(flake);

            setTimeout(() => {
                flake.remove();
            }, 5000);
        }
        setInterval(createSnowflake, 150);
    </script>

    <div class="container">
        <h1>Welcome!</h1>
        <p class="subtitle">Here are the best free & cracked cheats</p>
        <div class="arrow">↓</div>

        <h2 class="section-title">Downloads</h2>

        <div class="downloads-grid">
            <div class="card">
                <h3>Breeze 1.8.9</h3>
                <a href="#" target="_blank" class="download-btn">Download</a>
            </div>

            <div class="card">
                <h3>VapeV4 (crack) 1.8.9</h3>
                <a href="#" target="_blank" class="download-btn">Download</a>
            </div>

            <div class="card">
                <h3>Volt 1.21.1</h3>
                <a href="#" target="_blank" class="download-btn">Download</a>
            </div>
        </div>
    </div>

</body>
</html>
