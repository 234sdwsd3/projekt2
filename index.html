<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloads & Clients</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f1115;
            color: #e6e8ec;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
        }

        /* Hópelyhek */
        .snowflake {
            position: fixed;
            top: -10px;
            color: #ffffff;
            font-size: 1em;
            opacity: 0.8;
            pointer-events: none;
            user-select: none;
            animation: fall linear infinite;
            z-index: 1;
        }

        @keyframes fall {
            to {
                transform: translateY(105vh);
            }
        }

        /* Fő konténer */
        .container {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            z-index: 10;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 2.5rem;
            color: #ffffff;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        p.subtitle {
            color: #a0a5b1;
            font-size: 1.1rem;
            margin-bottom: 25px;
        }

        .arrow {
            font-size: 1.8rem;
            color: #d1d5db;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(8px); }
            60% { transform: translateY(4px); }
        }

        h2.section-title {
            font-size: 1.6rem;
            color: #ffffff;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
            display: inline-block;
        }

        /* Lista nézet (Grid) */
        .downloads-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
            border-color: #ffffff;
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.15);
        }

        .card h3 {
            font-size: 1.2rem;
            color: #ffffff;
        }

        /* Részletek nézet */
        .detail-view {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .detail-view.active {
            display: flex;
        }

        .preview-img {
            max-width: 100%;
            max-height: 280px;
            border-radius: 12px;
            margin: 20px 0;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            object-fit: contain;
        }

        .description {
            color: #d1d5db;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 25px;
            max-width: 600px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            width: 100%;
            max-width: 400px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: all 0.3s ease;
            font-size: 1rem;
            flex: 1;
        }

        .btn-download {
            background: #ffffff;
            color: #0f1115;
        }

        .btn-download:hover {
            background: #e2e8f0;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <!-- Hópelyhek generálása -->
    <script>
        function createSnowflake() {
            const flake = document.createElement('div');
            flake.classList.add('snowflake');
            flake.innerHTML = '❄';
            flake.style.left = Math.random() * 100 + 'vw';
            flake.style.animationDuration = Math.random() * 3 + 2 + 's';
            flake.style.opacity = Math.random();
            flake.style.fontSize = Math.random() * 10 + 10 + 'px';
            document.body.appendChild(flake);

            setTimeout(() => {
                flake.remove();
            }, 5000);
        }
        setInterval(createSnowflake, 150);
    </script>

    <div class="container">
        <!-- Kezdőoldal tartalom -->
        <div id="mainView">
            <h1>Welcome!</h1>
            <p class="subtitle">Here are the best free & cracked cheats</p>
            <div class="arrow">↓</div>

            <h2 class="section-title">Downloads</h2>

            <div class="downloads-grid">
                <div class="card" onclick="showDetail('vape')">
                    <h3>VapeV4 (crack) 1.8.9</h3>
                </div>
                <div class="card" onclick="showDetail('volt')">
                    <h3>Volt 1.21.1</h3>
                </div>
            </div>
        </div>

        <!-- Részletek nézet -->
        <div id="detailView" class="detail-view">
            <h2 id="detailTitle" class="section-title">Client Name</h2>
            <img id="detailImage" class="preview-img" src="" alt="Client Preview">
            <p id="detailDescription" class="description"></p>
            
            <div class="btn-group">
                <button class="btn btn-back" onclick="showMain()">Back</button>
                <a id="detailDownloadLink" href="#" class="btn btn-download" target="_blank">Download</a>
            </div>
        </div>
    </div>

    <script>
        // Adatok tárolása
        const clientsData = {
            vape: {
                title: "VapeV4 (crack) 1.8.9",
                image: "vape.png",
                description: "Get an unfair advantage over your opponents, while remaining completely undetected.",
                downloadUrl: "#" // Ide írd majd a letöltési linket
            },
            volt: {
                title: "Volt 1.21.1",
                image: "volt.png",
                description: "Volt Client is a FOSS Minecraft ghost client. It was initially supposed to be paid however they decided to make it free. The client seems to be very good and, espicially the triggerbot. It should work for both 1.21.1 and 1.21 Minecraft Fabric.",
                downloadUrl: "https://linktw.in/rvJrOq" // Ide írd majd a letöltési linket
            }
        };

        function showDetail(key) {
            const client = clientsData[key];
            if (!client) return;

            document.getElementById('detailTitle').innerText = client.title;
            document.getElementById('detailImage').src = client.image;
            document.getElementById('detailDescription').innerText = client.description;
            document.getElementById('detailDownloadLink').href = client.downloadUrl;

            document.getElementById('mainView').style.display = 'none';
            document.getElementById('detailView').classList.add('active');
        }

        function showMain() {
            document.getElementById('detailView').classList.remove('active');
            document.getElementById('mainView').style.display = 'block';
        }
    </script>

</body>
</html>
